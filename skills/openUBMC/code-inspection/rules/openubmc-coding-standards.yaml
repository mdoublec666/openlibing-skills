  - id: SEC-016
    name: 外部输入校验检查
    description: 检查对于外部输入进行直接校验，不要对二次计算后的结果进行间接校验
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索对外部输入运算后的结果进行校验的代码
    judgmentCondition: 如果发现对外部输入的运算结果进行校验而非直接校验输入本身，则判定为问题
    examples:
      - code: |
          if data_len > msg_len then
              return -1
          end
          -- data_len = sizeof(MSG_INFO_S) + data_cnt * sizeof(Data_S)
        problem: 对运算结果校验，可能被整数溢出绕过
        language: lua
      - code: |
          if data_cnt > MAX_COUNT then
              return -1
          end
          local data_len = sizeof(MSG_INFO_S) + data_cnt * sizeof(Data_S)
          if data_len > msg_len then
              return -1
          end
        problem: 正确示例，先直接校验输入
        language: lua
    messageTemplate: "在 {file}:{line} 发现对运算结果校验：{code}"
    suggestion: "直接对外部输入进行校验，避免整数溢出等问题"

