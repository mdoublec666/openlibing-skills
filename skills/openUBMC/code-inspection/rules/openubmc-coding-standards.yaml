    messageTemplate: "在 {file}:{line} 发现可能并发解压：{code}"
    suggestion: "添加解压锁或重入判断，禁止同一目录并发解压"

  - id: SEC-010
    name: 导入文件属主检查
    description: 检查使用外部导入的文件之前是否判断文件属主是否与执行导入操作的用户一致
    severity: error
    sceneMatch: 适用于涉及文件导入的Lua代码
    dataFilter: 搜索文件导入操作，检查是否验证文件属主
    judgmentCondition: 如果发现导入外部文件前未检查文件属主与当前用户是否一致，则判定为问题
    examples:
      - code: |
          function import_config(file_path)
              local data = utils.read_file(file_path)
