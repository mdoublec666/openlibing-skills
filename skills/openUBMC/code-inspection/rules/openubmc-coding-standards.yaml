    judgmentCondition: 如果发现正式代码中使用assert或error（非错误引擎场景），则判定为问题
    examples:
      - code: "assert(result ~= nil, 'result cannot be nil')"
        problem: 正式代码使用assert断言
        language: lua
      - code: |
          local ok, err = pcall(function()
              -- 可能抛异常的操作
          end)
          if not ok then
              -- handle error
          end
        problem: 正确示例，使用pcall处理异常
        language: lua
    exceptions:
      - scenario: 错误引擎机制
        reason: 错误引擎机制依赖error函数，可以使用
      - scenario: 集成测试和单元测试
        reason: 测试代码中允许使用assert和error
    messageTemplate: "在 {file}:{line} 发现正式代码使用断言：{code}"
    suggestion: "使用pcall或xpcall捕获异常，而非assert断言"

