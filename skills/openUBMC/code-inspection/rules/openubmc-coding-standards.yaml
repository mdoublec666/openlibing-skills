name: openubmc-coding-standards
version: 1.0.0
description: openUBMC社区编程规范规则集，包含代码风格、编程实践、安全编码、异常处理和SR配置等规范

rules:
  # ========== 代码风格 - 命名 ==========
  - id: NAM-001
    name: 标识符命名规范检查
    description: 检查标识符命名是否符合openUBMC命名规范，包括snake_case、大驼峰、全大写等风格要求
    severity: warning
    sceneMatch: 适用于所有Lua源代码文件，排除测试文件和第三方依赖
    dataFilter: 搜索变量名、函数名、类名、常量名等标识符定义，重点关注不符合命名风格的代码
    judgmentCondition: 如果发现标识符命名不符合openUBMC命名规范（如类名未使用snake_case、RPC方法未使用大驼峰、常量未全大写等），则判定为问题
    examples:
      - code: "local className = {}"
        problem: 类名应使用snake_case风格，应为class_name
        language: lua
      - code: "function module_name:set_name(exampleName)"
        problem: RPC方法参数应使用大驼峰风格，应为ExampleName
        language: lua
      - code: "local default_port = 8080"
        problem: 常量应全大写下划线分割，应为DEFAULT_PORT
        language: lua
    exceptions:
      - scenario: 第三方库的API接口
        reason: 第三方库的命名规范不由我们控制，需要保持原样
    messageTemplate: "在 {file}:{line} 发现标识符命名不符合规范：{code}"
    suggestion: "参考openUBMC命名规范表，使用正确的命名风格：仓库名/组件名/文件/模块/类/函数/变量使用snake_case，RPC方法和参数使用大驼峰，常量和枚举值全大写"

  - id: NAM-002
    name: 标识符拼写检查
    description: 检查标识符拼写是否正确，是否符合通用习惯缩写
    severity: warning
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索所有标识符定义，检查是否有拼写错误或非标准缩写
    judgmentCondition: 如果发现标识符拼写明显错误或使用了不规范的缩写（如用非标准缩写代替完整单词），则判定为问题
    examples:
      - code: "local mangment = {}"
        problem: 拼写错误，应为management
        language: lua
      - code: "local configuraton = {}"
        problem: 拼写错误，应为configuration
        language: lua
    messageTemplate: "在 {file}:{line} 发现标识符拼写可能错误：{code}"
    suggestion: "检查标识符拼写是否正确，使用规范的英文单词或标准缩写（参考规范中的常用英文缩写对照表）"

  # ========== 代码风格 - 注释 ==========
  - id: CMT-001
    name: 晦涩代码注释检查
    description: 检查较为晦涩的代码、特殊处理场景代码是否有详尽注释
    severity: warning
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索复杂的逻辑代码、特殊处理代码、协议字段处理、自定义配置文件格式处理等
    judgmentCondition: 如果发现代码逻辑复杂但缺少注释说明，或者有特殊处理但未说明背景、业务场景、处理逻辑等，则判定为问题
    examples:
      - code: |
          -- 无注释的复杂位运算
          local value = data & 0xFF
          local result = (value >> 4) | ((value & 0x0F) << 4)
        problem: 复杂的位运算操作缺少注释说明其用途和计算逻辑
        language: lua
      - code: |
          -- 无注释的特殊处理
          if vendor == 'xxx' then
              -- 某些特殊操作
          end
        problem: 针对特定供应商的特殊处理缺少背景说明和规避原因注释
        language: lua
    exceptions:
      - scenario: 简单直观的代码
        reason: 对于显而易见的代码不需要额外注释
    messageTemplate: "在 {file}:{line} 发现复杂代码缺少必要注释：{code}"
    suggestion: "为晦涩难懂的代码添加注释，说明相关知识、协议字段格式、特殊处理背景和原因等"

  # ========== 编程实践 - 表操作 ==========
  - id: TBL-001
    name: 弱引用表与gc元方法混用检查
    description: 检查是否禁止弱引用表与__gc元方法混用
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索setmetatable函数调用，检查是否同时设置了__mode和__gc
    judgmentCondition: 如果发现同一表同时设置了__mode（弱引用）和__gc元方法，则判定为严重问题
    examples:
      - code: "local table_a = setmetatable({}, {__mode = 'kv', __gc = function() end})"
        problem: 弱引用表与__gc元方法混用，在LuaJIT中可能引发无法预期的错误
        language: lua
    messageTemplate: "在 {file}:{line} 发现弱引用表与__gc元方法混用：{code}"
    suggestion: "移除__gc元方法或__mode设置，不要在同一表中混用"

  - id: TBL-002
    name: 表直接比较检查
    description: 检查是否使用了Lua表的直接比较操作
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索使用==或~=进行表比较的代码
    judgmentCondition: 如果发现直接使用==或~=(比较两个table变量或table与空表{}），则判定为问题
    examples:
      - code: "if table_a == {} then"
        problem: Lua表不支持直接比较，应使用utils.table_compare或next(table) == nil
        language: lua
      - code: "if table_a == table_b then"
        problem: Lua表不支持直接比较，应使用utils.table_compare
        language: lua
    exceptions:
      - scenario: 表与nil的比较
        reason: 表与nil的比较是检查表是否存在，这是有效的
    messageTemplate: "在 {file}:{line} 发现表直接比较：{code}"
    suggestion: "使用utils.table_compare函数进行比较，或使用next(table) == nil检查空表"

  - id: TBL-003
    name: pairs/ipairs误用检查
    description: 检查是否正确使用pairs和ipairs遍历表
    severity: warning
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索for循环中使用pairs或ipairs遍历表的代码
    judgmentCondition: 如果发现对连续数组使用pairs遍历（需要有序），或对不连续数组/字典使用ipairs遍历，则判定为问题
    examples:
      - code: |
          local a = {1, 2, 3, 4, 5}
          for k, v in pairs(a) do
              print(v)
          end
        problem: 对连续数组使用pairs遍历，不保证顺序，应使用ipairs
        language: lua
      - code: |
          local b = {[1] = '1', ['a'] = 'a'}
          for k, v in ipairs(b) do
              print(v)
          end
        problem: 对包含非连续索引的表使用ipairs，无法完整遍历所有元素
        language: lua
    messageTemplate: "在 {file}:{line} 发现pairs/ipairs误用：{code}"
    suggestion: "有序遍历数组使用ipairs，完整遍历不连续数组或字典使用pairs"

  - id: TBL-004
    name: 取长度操作#使用检查
    description: 检查使用#取长度时是否确保表是序列且未包含其他类型键值
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索使用#运算符对table类型取长度的代码
    judgmentCondition: 如果发现对非序列表（正数键集不连续或从1开始）或包含其他类型键值的表使用#取长度，则判定为问题
    examples:
      - code: |
          local a = {[2] = 1, [3] = 2}
          print(#a)
        problem: 表不是序列（缺少键值1），使用#取长度结果不可预测
        language: lua
      - code: |
          local c = {[1] = 1, [2] = 2, ['s'] = 3}
          print(#c)
        problem: 表包含其他类型键值，使用#取长度容易产生误解
        language: lua
    messageTemplate: "在 {file}:{line} 发现对非序列表使用#取长度：{code}"
    suggestion: "确保表是序列（正数键集从1开始连续）且未包含其他类型键值时再使用#"

  - id: TBL-005
    name: table.remove使用检查
    description: 检查使用table.remove时是否确保表是序列
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索table.remove函数调用
    judgmentCondition: 如果发现对非序列表使用table.remove，则判定为问题
    examples:
      - code: |
          local a = {[2] = 1, [3] = 2}
          table.remove(a, 2)
        problem: 表不是序列，使用table.remove会报错
        language: lua
    messageTemplate: "在 {file}:{line} 发现对非序列表使用table.remove：{code}"
    suggestion: "确保表是序列后再使用table.remove，否则使用table[i] = nil方式删除"

  - id: TBL-006
    name: 遍历中修改表检查
    description: 检查在pairs遍历表时是否同时对表做插入和删除操作
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索for循环中使用pairs遍历，循环体内有表插入或删除操作的代码
    judgmentCondition: 如果发现在pairs遍历循环中对正在遍历的表进行插入或删除操作，则判定为问题
    examples:
      - code: |
          local a = {1, 2, 3}
          for k, v in pairs(a) do
              a[k] = nil
              a[k + 3] = v
          end
        problem: 在pairs遍历中对表同时进行插入和删除，会导致报错
        language: lua
    messageTemplate: "在 {file}:{line} 发现遍历中修改表：{code}"
    suggestion: "避免在遍历循环中修改正在遍历的表，可先收集需要操作的索引，遍历完成后再操作"

  - id: TBL-007
    name: 弱引用表使用检查
    description: 检查使用Lua弱引用表时是否确保表外有对变量进行引用，或变量垃圾回收不影响业务功能
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索setmetatable设置__mode的代码，检查弱引用表的使用场景
    judgmentCondition: 如果发现弱引用表用于存放需要持久化的对象，且表外没有其他引用，则判定为问题
    examples:
      - code: |
          local db_objs = setmetatable({}, {__mode = 'kv'})
          function add_db_obj(obj)
              db_objs[obj] = context.get_context() or context.new()
          end
        problem: 弱引用表用于存放持久化对象，离开作用域后可能被垃圾回收导致数据丢失
        language: lua
    exceptions:
      - scenario: 缓存池场景
        reason: 缓存池场景下对象被垃圾回收后可以重新创建，不影响业务功能
    messageTemplate: "在 {file}:{line} 发现弱引用表使用不当：{code}"
    suggestion: "确保弱引用表用于缓存等可容忍垃圾回收的场景，持久化对象应使用普通表"

  - id: TBL-008
    name: 插件参数传递检查
    description: 检查应用插件机制时是否使用深拷贝传递table类型参数
    severity: warning
    sceneMatch: 适用于涉及插件机制的Lua代码
    dataFilter: 搜索调用插件函数时传递table类型参数的代码
    judgmentCondition: 如果发现直接传递table参数到插件，且该参数后续在组件内需要继续使用，则判定为问题
    examples:
      - code: |
          function plugin_method.set_property(parameter)
              local ok, rsp = pcall(func, parameter)
          end
        problem: table参数直接传入插件，可能被插件内部修改
        language: lua
    messageTemplate: "在 {file}:{line} 发现table参数未深拷贝传入插件：{code}"
    suggestion: "使用utils.table_copy深拷贝一份table参数传入插件"

  - id: TBL-009
    name: 高频赋空表检查
    description: 检查高频调用场景中是否禁止通过赋空表的方式实现表的清空
    severity: error
    sceneMatch: 适用于所有Lua源代码文件，特别关注高频调用的循环或函数
    dataFilter: 搜索在循环或高频函数中给table变量赋空表{}的代码
    judgmentCondition: 如果发现在高频调用的循环或函数中通过赋空表{}清空表，则判定为问题
    examples:
      - code: |
          for i = 1, 10000 do
              local config = {}
              -- 使用config
          end
        problem: 高频调用中赋空表会导致内存持续增长
        language: lua
    messageTemplate: "在 {file}:{line} 发现高频调用中赋空表：{code}"
    suggestion: "使用依次赋nil的方式或mc.table_cache类来清空表"

  # ========== 编程实践 - 函数 ==========
  - id: FUN-001
    name: 信号处理函数重量检查
    description: 检查信号处理函数是否轻量，禁止添加延时函数
    severity: error
    sceneMatch: 适用于所有Lua源代码文件，特别关注信号处理相关代码
    dataFilter: 搜索信号处理函数，检查函数体内是否有skynet.sleep等延时操作
    judgmentCondition: 如果发现信号处理函数处理时间过长或包含skynet.sleep等延时函数，则判定为问题
    examples:
      - code: |
          function on_signal()
              skynet.sleep(100)
              -- 其他操作
          end
        problem: 信号处理函数中添加了延时函数skynet.sleep
        language: lua
    messageTemplate: "在 {file}:{line} 发现信号处理函数非轻量：{code}"
    suggestion: "信号处理函数应保持轻量，避免添加延时函数"

  - id: FUN-002
    name: 循环体中local变量检查
    description: 检查循环体中是否定义了local变量，建议放在循环体外定义
    severity: warning
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索for循环体内定义的local变量
    judgmentCondition: 如果发现在循环体中定义local变量且该变量可以在循环体外定义，则判定为问题
    examples:
      - code: |
          for i = 1, #array do
              local a
              a = array[i].number
          end
        problem: 循环体中定义local变量，应放在循环体外
        language: lua
    messageTemplate: "在 {file}:{line} 发现循环体中定义local变量：{code}"
    suggestion: "将local变量定义移到循环体外，减少内存申请"

  - id: FUN-003
    name: 下划线函数参数检查
    description: 检查是否禁止将_作为函数入参
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索函数定义中使用_作为参数名的代码
    judgmentCondition: 如果发现函数参数使用_作为占位符，则判定为问题
    examples:
      - code: "local res, _ = func(cmd, _, request.data_out)"
        problem: 使用_作为函数入参，_可能已作为全局变量被赋值
        language: lua
    exceptions:
      - scenario: 函数返回值的占位
        reason: _作为函数返回值的占位符是Lua的常见用法
    messageTemplate: "在 {file}:{line} 发现使用_作为函数入参：{code}"
    suggestion: "直接通过nil占位，不要使用_作为函数入参"

  # ========== 编程实践 - 程序块 ==========
  - id: CHK-001
    name: 取长度前类型检查
    description: 检查对变量使用#取长度前是否确保变量为string/table类型或有__len()元方法
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索使用#运算符的代码，检查操作数是否先进行类型检查
    judgmentCondition: 如果发现对可能非string/table类型的变量直接使用#取长度且未进行类型检查，则判定为问题
    examples:
      - code: "if #v.SRVersion > 0 then"
        problem: 未确保v.SRVersion为string或table类型就使用#
        language: lua
      - code: "if type(v.SRVersion) == 'string' and #v.SRVersion > 0 then"
        problem: 正确示例，先检查类型再取长度
        language: lua
    messageTemplate: "在 {file}:{line} 发现未检查类型就使用#：{code}"
    suggestion: "使用#前先用type函数检查变量是否为string或table类型"

  - id: CHK-002
    name: string.find plain参数检查
    description: 检查使用string.find时是否正确使用plain参数
    severity: warning
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索string.find函数调用
    judgmentCondition: 如果发现string.find的第4个参数为true但缺少第3个参数，或本应使用plain参数但未使用，则判定为问题
    examples:
      - code: "string.find(uri, '.ISO', true)"
        problem: 传入第4个参数但缺少第3个参数，plain参数不会生效
        language: lua
      - code: "string.find(uri, '.ISO', 1, true)"
        problem: 正确示例，同时传入第3和第4个参数
        language: lua
    messageTemplate: "在 {file}:{line} 发现string.find plain参数使用不当：{code}"
    suggestion: "如果需要传入第4个参数plain=true，必须同时传入第3个参数（起始位置）"

  - id: CHK-003
    name: 三目运算B为false检查
    description: 检查使用A and B or C进行三目运算时B是否可能为false
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索使用and...or...三目运算符的代码
    judgmentCondition: 如果发现三目运算中B的取值可能为false或nil，则判定为问题
    examples:
      - code: "local res = (val_a == 1) and false or true"
        problem: B取值为false时，无论A真假结果都为C，不符合预期
        language: lua
    messageTemplate: "在 {file}:{line} 发现三目运算B可能为false：{code}"
    suggestion: "当B可能为false时，使用if...else表达式代替三目运算"

  - id: CHK-004
    name: goto语句使用检查
    description: 检查是否使用了Lua的goto语句
    severity: warning
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索goto语句和标签定义
    judgmentCondition: 如果发现使用了goto语句，则判定为问题
    examples:
      - code: |
          goto skip
          ::skip::
        problem: 不推荐使用goto语句
        language: lua
    exceptions:
      - scenario: 错误处理跳转
        reason: 在复杂的错误处理场景中，goto可能用于统一清理资源
    messageTemplate: "在 {file}:{line} 发现使用goto语句：{code}"
    suggestion: "避免使用goto语句，使用更清晰的控制流结构"

  # ========== 编程实践 - 多线程 ==========
  - id: MTH-001
    name: coroutine使用检查
    description: 检查在skynet框架中是否禁止使用coroutine创建协程
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索coroutine.create、coroutine.resume、coroutine.yield等直接调用
    judgmentCondition: 如果发现直接使用Lua的coroutine创建协程（非skynet.fork），则判定为严重问题
    examples:
      - code: "coroutine.create(function() end)"
        problem: 在skynet框架中应使用skynet.fork创建协程，禁止直接使用coroutine
        language: lua
    exceptions:
      - scenario: 框架内部代码
        reason: skynet框架内部可能需要使用coroutine
    messageTemplate: "在 {file}:{line} 发现直接使用coroutine：{code}"
    suggestion: "使用skynet.fork替代coroutine创建协程"

  - id: MTH-002
    name: ORM中skynet协程检查
    description: 检查是否禁止在ORM对象中通过skynet创建协程
    severity: error
    sceneMatch: 适用于ORM相关Lua代码
    dataFilter: 搜索ORM对象（c_开头的类）中使用skynet.fork的代码
    judgmentCondition: 如果发现在ORM对象方法中使用skynet.fork创建协程，则判定为问题
    examples:
      - code: |
          function c_network_adapter:set_npu_max_sfp_temp()
              skynet.fork(function()
                  while true do
                      self:update_npu_max_sfp_temp(ops)
                  end
              end)
          end
        problem: 在ORM对象中通过skynet.fork创建协程，对象卸载后协程不会消亡
        language: lua
    messageTemplate: "在 {file}:{line} 发现ORM中使用skynet创建协程：{code}"
    suggestion: "使用self:next_tick替代skynet.fork在ORM中创建协程"

  - id: MTH-003
    name: 协程挂起唤醒混用检查
    description: 检查使用skynet.wait/skynet.wakeup时是否中途有其他挂起协程操作
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索同时使用skynet.wait/skynet.wakeup和skynet.sleep的代码
    judgmentCondition: 如果发现skynet.wait/wakeup操作之间插入skynet.sleep等其他挂起操作，则判定为问题
    examples:
      - code: |
          function func()
              local co = coroutine.running()
              skynet.fork(function()
                  skynet.wakeup(co)
              end)
              skynet.sleep(10)
              skynet.wait()
          end
        problem: skynet.sleep会影响skynet.wait/wakeup的预期行为
        language: lua
    messageTemplate: "在 {file}:{line} 发现协程挂起唤醒混用：{code}"
    suggestion: "将skynet.sleep等挂起操作放在独立的协程中，避免影响原协程的挂起唤醒"

  # ========== 编程实践 - 数据库 ==========
  - id: DBS-001
    name: 数据库批量插入事务检查
    description: 检查数据库批量插入时是否使用事务机制进行批量提交
    severity: warning
    sceneMatch: 适用于涉及数据库操作的Lua代码
    dataFilter: 搜索循环中进行数据库插入/删除操作的代码
    judgmentCondition: 如果发现批量（5条及以上）数据库操作未使用事务（db:tx），则判定为问题
    examples:
      - code: |
          for _, v in pairs(power_table) do
              local power_row_data = local_db['Power'](saved_data)
              power_row_data:save()
          end
        problem: 批量数据库操作未使用事务，应使用db:tx包装
        language: lua
      - code: |
          local ok, err = pcall(local_db.db.tx, local_db.db, function()
              for _, v in pairs(power_table) do
                  local_db.Power(v):save()
              end
          end)
        problem: 正确示例，使用事务进行批量提交
        language: lua
    messageTemplate: "在 {file}:{line} 发现批量数据库操作未使用事务：{code}"
    suggestion: "批量数据库操作应使用db:tx包装，使用pcall调用以处理错误"

  - id: DBS-002
    name: 枚举主键检查
    description: 检查是否避免使用枚举类型的属性作为持久化数据库表的主键
    severity: error
    sceneMatch: 适用于MDS model.json配置文件
    dataFilter: 搜索model.json中primaryKey为true且baseType为Enum的属性定义
    judgmentCondition: 如果发现枚举类型的属性被设置为主键，则判定为问题
    examples:
      - code: |
          "properties": {
              "Id": {
                  "baseType": "Enum",
                  "$ref": "types.json#/defs/EnumType",
                  "primaryKey": true
              }
          }
        problem: 使用枚举类型作为主键，版本回退时可能因找不到新增枚举值而失败
        language: json
    messageTemplate: "在 {file}:{line} 发现枚举类型作为主键：{code}"
    suggestion: "根据实际数据类型定义主键（如U8、U32等），避免使用枚举类型"

  # ========== 编程实践 - 其他 ==========
  - id: OTH-001
    name: 对象名处理业务流程检查
    description: 检查是否禁止使用对象名处理业务流程
