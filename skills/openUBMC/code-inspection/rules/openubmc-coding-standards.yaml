  - id: OTH-002
    name: 日志格式化符类型检查
    description: 检查mc.logging库中格式化日志输出函数的格式化符与参数类型是否匹配
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索mc.logging的log:info、log:error等函数，检查%d和%u格式化符的参数
    judgmentCondition: 如果发现使用%d或%u格式化符但输出值为非整型（如浮点数），则判定为问题
    examples:
      - code: |
          local c = 5 / 2
          log:info('c = %d', c)
        problem: c为浮点数2.5，使用%d会抛异常
        language: lua
      - code: |
          local d = 5 // 2
          log:info('d = %d', d)
        problem: 正确示例，d为整型2
        language: lua
    messageTemplate: "在 {file}:{line} 发现日志格式化符类型不匹配：{code}"
    suggestion: "确保%d和%u格式化符的输出值为整型，或使用%s格式化符避免类型问题"

  - id: OTH-003
    name: 系统时间计算间隔检查
    description: 检查是否禁止使用系统时间来计算时间间隔
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索使用vos_get_cur_time_stamp、os.time、utils.time_ms等系统时间函数计算时间差的代码
    judgmentCondition: 如果发现使用系统时间计算时间间隔（而非记录时刻），则判定为问题
    examples:
      - code: |
          local start = vos.vos_get_cur_time_stamp()
          -- do something
          local elapsed = vos.vos_get_cur_time_stamp() - start
        problem: 使用系统时间计算时间间隔，NTP同步会导致时间跳变影响结果
        language: lua
      - code: |
          local start = vos.vos_tick_get()
          -- do something
          local elapsed = vos.vos_tick_get() - start
        problem: 正确示例，使用运行时间计算间隔
        language: lua
    messageTemplate: "在 {file}:{line} 发现使用系统时间计算间隔：{code}"
    suggestion: "使用vos.vos_tick_get()或skynet.now()等运行时间函数计算时间间隔"

  - id: OTH-004
    name: 八进制数表示检查
    description: 检查是否禁止使用0XXX表示8进制数
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索以0开头的数字字面量
    judgmentCondition: 如果发现使用0XXX格式表示8进制数（如0640），则判定为问题
    examples:
      - code: "utils.chmod(file_path, 0640)"
        problem: Lua不支持0XXX表示8进制数
        language: lua
      - code: "utils.chmod(file_path, utils.S_IRUSR | utils.S_IWUSR | utils.S_IRGRP)"
        problem: 正确示例，使用位或组合权限标志
        language: lua
    messageTemplate: "在 {file}:{line} 发现使用0XXX表示八进制：{code}"
    suggestion: "使用位或运算组合权限标志，或使用十进制数"

  - id: OTH-005
    name: 热插拔对象单例模式检查
    description: 检查是否禁止对有热插拔场景的csr对象使用单例模式
    severity: error
    sceneMatch: 适用于CSR相关Lua代码
    dataFilter: 搜索c_开头的ORM类中使用单例模式的代码
    judgmentCondition: 如果发现对有热插拔场景的csr对象使用单例模式，则判定为问题
    examples:
      - code: |
          local c_device = class()
          function c_device.instance()
              -- 单例实现
          end
        problem: 有热插拔场景的对象使用单例，重新分发时会使用脏数据
        language: lua
    messageTemplate: "在 {file}:{line} 发现热插拔对象使用单例模式：{code}"
    suggestion: "不要对有热插拔场景的对象使用单例模式"

  - id: OTH-006
    name: 全局skynet队列检查
    description: 检查使用skynet.queue队列时是否避免使用全局队列
    severity: warning
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索skynet.queue的使用，检查是否声明为全局变量
    judgmentCondition: 如果发现使用全局的skynet.queue队列（多个对象/函数共用），则判定为问题
    examples:
      - code: |
          local queue = require 'skynet.queue'
          local cs = queue() -- 全局队列
          local s = class()
          function s:fun1()
              cs(funa, ...)
          end
          function s:fun2()
              cs(funb, ...)
          end
        problem: 使用全局队列，不同函数的执行会互相影响
        language: lua
      - code: |
          local queue = require 'skynet.queue'
          local s = class()
          function s:ctor()
              self.cs_a = queue()
              self.cs_b = queue()
          end
        problem: 正确示例，每个对象和函数使用独立的队列
        language: lua
    messageTemplate: "在 {file}:{line} 发现使用全局队列：{code}"
    suggestion: "将队列声明为对象成员变量，不同对象和函数使用独立的队列"

  - id: OTH-007
    name: sed命令硬编码行号检查
    description: 检查使用sed命令是否禁止带有硬编码行号
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索sed命令执行，检查是否包含硬编码行号
    judgmentCondition: 如果发现sed命令使用硬编码行号（如sed -i '12 i\ xxx'），则判定为问题
    examples:
      - code: "self.run(\"sed -i '12 i\\ chown root:root /dev/shm/dbus/.dbus' rundbus.sh\")"
        problem: 使用硬编码行号，文件变化会导致修改内容错位
        language: lua
      - code: "self.run(\"sed -i '$ i\\chown root:root /dev/shm/dbus/.dbus' rundbus.sh\")"
        problem: 正确示例，基于行尾查找
        language: lua
    messageTemplate: "在 {file}:{line} 发现sed命令使用硬编码行号：{code}"
    suggestion: "使用文件尾查找或模式匹配替代硬编码行号"

  - id: OTH-008
    name: skynet.send结果获取检查
    description: 检查跨skynet服务调用若需要获取执行结果应使用skynet.call而非skynet.send
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索使用skynet.send并检查返回值的代码
    judgmentCondition: 如果发现使用skynet.send发送消息并检查返回结果，则判定为问题
    examples:
      - code: |
          local ok, ret = pcall(function()
              return skynet.send('main', 'lua', 'exec_function', parameter)
          end)
        problem: skynet.send为异步调用，无法获取执行结果，应使用skynet.call
        language: lua
      - code: |
          local ok, ret = pcall(function()
              return skynet.call('main', 'lua', 'exec_function', parameter)
          end)
        problem: 正确示例，使用skynet.call同步获取执行结果
        language: lua
    exceptions:
      - scenario: 不需要返回值的异步通知
        reason: 如果只是发送通知不需要返回结果，使用skynet.send是合理的
    messageTemplate: "在 {file}:{line} 发现使用skynet.send获取结果：{code}"
    suggestion: "需要获取执行结果时使用skynet.call而非skynet.send"

  # ========== 安全编码 - 注入缺陷 ==========
  - id: SEC-001
    name: os.execute/io.popen使用检查
    description: 检查是否禁止使用os.execute、io.popen函数
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索os.execute和io.popen函数调用
    judgmentCondition: 如果发现使用os.execute或io.popen函数，则判定为严重安全问题
    examples:
      - code: "os.execute('cp /tmp/config.json /dev/shm/config.json')"
        problem: 使用os.execute可能导致进程卡死
        language: lua
      - code: "vos.system_s('/bin/cp', '/tmp/config.json', '/dev/shm/config.json')"
        problem: 正确示例，使用vos.system_s执行shell命令
        language: lua
    messageTemplate: "在 {file}:{line} 发现使用os.execute或io.popen：{code}"
    suggestion: "使用vos.system_s函数替代os.execute和io.popen"

  - id: SEC-002
    name: shell命令注入检查
    description: 检查以/bin/sh或/bin/bash作为命令解释器时是否对vos.system_s函数进行命令注入参数检查
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索vos.system_s调用，第一个参数为/bin/sh或/bin/bash的情况
    judgmentCondition: 如果发现vos.system_s使用/bin/sh或/bin/bash作为解释器且参数可能包含外部输入但未进行check_shell_special_character_s检查，则判定为问题
    examples:
      - code: "vos.system_s('/bin/sh', '-c', 'cp', src_dir, '/tmp/test')"
        problem: 使用/bin/sh作为解释器但未对src_dir进行命令注入检查
        language: lua
      - code: |
          if utils_file.check_shell_special_character_s(src_dir) ~= 0 then
              return
          end
          vos.system_s('/bin/sh', '-c', 'cp', src_dir, '/tmp/test')
        problem: 正确示例，先进行命令注入检查
        language: lua
    exceptions:
      - scenario: 参数全部硬编码
        reason: 如果参数都是硬编码不包含外部输入，可以不检查
    messageTemplate: "在 {file}:{line} 发现shell命令可能存在注入风险：{code}"
    suggestion: "使用check_shell_special_character_s检查参数，或不使用/bin/sh作为解释器"

  - id: SEC-003
    name: 代码加载函数外部输入检查
    description: 检查外部输入作为require、load、loadfile、dofile、loadstring等函数参数时是否进行白名单校验
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索require、load、loadfile、dofile、loadstring函数调用
    judgmentCondition: 如果发现外部输入直接作为这些函数的参数且未进行白名单校验，则判定为严重安全问题
    examples:
      - code: "local module = require(user_input)"
        problem: 外部输入直接作为require参数，存在代码注入风险
        language: lua
      - code: |
          local allowed_modules = {module1 = true, module2 = true}
          if allowed_modules[user_input] then
              require(user_input)
          end
        problem: 正确示例，进行白名单校验
        language: lua
    messageTemplate: "在 {file}:{line} 发现代码加载函数使用外部输入：{code}"
    suggestion: "对参数进行白名单校验，确保只加载允许的模块或文件"

  - id: SEC-004
    name: SQL注入检查
    description: 检查执行自定义SQL语句是否进行预编译
    severity: error
    sceneMatch: 适用于涉及数据库操作的Lua代码
    dataFilter: 搜索db:exec执行自定义SQL语句，检查是否拼接外部输入
    judgmentCondition: 如果发现SQL语句拼接外部输入但未进行预编译，则判定为问题
    examples:
      - code: |
          local cmd = 'select * from tb_test where level = ' .. level
          db:exec(cmd)
        problem: SQL语句拼接外部输入，存在SQL注入风险
        language: lua
      - code: |
          local cmd = 'select * from tb_test where level = ?'
          local vm = db:prepare(cmd)
          vm:bind_values(level)
          vm:step()
          vm:finalize()
        problem: 正确示例，使用预编译
        language: lua
    exceptions:
      - scenario: SQL语句硬编码
        reason: 如果SQL语句全部硬编码不包含外部输入，可以不预编译
    messageTemplate: "在 {file}:{line} 发现SQL注入风险：{code}"
    suggestion: "使用db:prepare预编译SQL语句，通过bind_values绑定参数"

  - id: SEC-005
    name: skynet.sleep浮点数检查
    description: 检查skynet.sleep函数入参是否为整数
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索skynet.sleep函数调用
    judgmentCondition: 如果发现skynet.sleep的参数是浮点数（使用/而非//），则判定为问题
    examples:
      - code: "skynet.sleep(ms / 10)"
        problem: skynet.sleep参数是浮点数，会抛出异常
        language: lua
      - code: "skynet.sleep(ms // 10)"
        problem: 正确示例，使用//确保参数为整数
        language: lua
    messageTemplate: "在 {file}:{line} 发现skynet.sleep使用浮点数：{code}"
    suggestion: "使用//整除运算确保参数为整数"

  # ========== 安全编码 - 文件操作 ==========
  - id: SEC-006
    name: 文件权限属主检查
    description: 检查创建文件或目录之后是否显式修改文件或目录的权限和属主
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索文件创建操作（如io.open、utils.write_file等），检查后续是否修改权限和属主
    judgmentCondition: 如果发现创建文件或目录后未显式设置权限和属主，则判定为问题
    examples:
      - code: |
          local f = io.open('/tmp/config.json', 'w')
          f:write(data)
          f:close()
        problem: 创建文件后未设置权限和属主
        language: lua
      - code: |
          local f = io.open('/tmp/config.json', 'w')
          f:write(data)
          f:close()
          utils.chmod_s('/tmp/config.json', 0600)
          utils.chown_s('/tmp/config.json', 0, 0)
        problem: 正确示例，设置权限和属主
        language: lua
    messageTemplate: "在 {file}:{line} 发现创建文件后未设置权限和属主：{code}"
    suggestion: "创建文件或目录后使用chmod_s和chown_s设置权限和属主"

  - id: SEC-007
    name: 文件路径安全检查
    description: 检查对于路径外部可控的文件进行任何操作前是否校验路径是否合法
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索文件操作函数（io.open、os.remove、utils.copy等）且参数可能外部可控的代码
    judgmentCondition: 如果发现对可能外部可控的文件路径进行操作前未使用check_real_path_s等安全函数校验，则判定为问题
    examples:
      - code: |
          function export_event(list, path)
              utils.remove(path)
          end
        problem: 未对path进行安全校验就删除
        language: lua
      - code: |
          function export_event(list, path)
              if check_realpath_before_open_s(path, '/tmp') ~= 0 then
                  return
              end
              utils.remove(path)
          end
        problem: 正确示例，先进行路径校验
        language: lua
    messageTemplate: "在 {file}:{line} 发现文件操作未进行安全校验：{code}"
    suggestion: "使用check_real_path_s、check_realpath_before_open_s等安全函数校验路径"

  - id: SEC-008
    name: 解压缩包安全检查
    description: 检查解压缩包操作是否进行完备的校验，防止zip炸弹
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索解压操作，如使用系统命令unzip、tar或Lua解压库
    judgmentCondition: 如果发现解压操作未使用框架提供的安全解压接口（secure_tar_unzip、unzip_s），则判定为问题
    examples:
      - code: "os.execute('unzip file.zip')"
        problem: 直接使用unzip命令，存在zip炸弹风险
        language: lua
      - code: |
          local ok = utils.secure_tar_unzip(file_path, dest_path, max_unzip_file_size, max_file_num)
          if not ok then
              log:error('secure_tar_unzip failed')
          end
        problem: 正确示例，使用安全解压接口
        language: lua
    messageTemplate: "在 {file}:{line} 发现不安全的解压操作：{code}"
    suggestion: "使用框架提供的secure_tar_unzip或unzip_s安全解压接口"

  - id: SEC-009
    name: 并发解压检查
    description: 检查往同一路径下解压文件是否做了重入判断，禁止允许并发解压
    severity: error
    sceneMatch: 适用于所有Lua源代码文件
    dataFilter: 搜索解压操作，检查是否有并发控制
    judgmentCondition: 如果发现同一路径下可能并发解压且无重入保护，则判定为问题
